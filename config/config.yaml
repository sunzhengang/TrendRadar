# ═══════════════════════════════════════════════════════════════
  # TrendRadar 配置文件
  # Version: 3.0.5
  # ═══════════════════════════════════════════════════════════════

  # ===============================================================
  # 1. 基础设置
  # ===============================================================
  app:
    timezone: "Asia/Shanghai"
    show_version_update: true

  # ===============================================================
  # 2. 数据源 - 热榜平台
  # ===============================================================
  platforms:
    enabled: true
    sources:
      - id: "toutiao"
        name: "今日头条"
      - id: "baidu"
        name: "百度热搜"
      - id: "wallstreetcn-hot"
        name: "华尔街见闻"
      - id: "thepaper"
        name: "澎湃新闻"
      - id: "bilibili-hot-search"
        name: "bilibili 热搜"
      - id: "cls-hot"
        name: "财联社热门"
      - id: "ifeng"
        name: "凤凰网"
      - id: "tieba"
        name: "贴吧"
      - id: "weibo"
        name: "微博"
      - id: "douyin"
        name: "抖音"
      - id: "zhihu"
        name: "知乎"

  # ===============================================================
  # 3. RSS 订阅
  # ===============================================================
  rss:
    enabled: true
    freshness_filter:
      enabled: true
      max_age_days: 3
    feeds: []

  # ===============================================================
  # 4. 报告模式
  # ===============================================================
  report:
    mode: "current"
    display_mode: "keyword"
    sort_by_position_first: false
    rank_threshold: 5
    max_news_per_keyword: 0

  # ===============================================================
  # 5. 推送内容控制
  # ===============================================================
  display:
    region_order:
      - new_items
      - hotlist
      - rss
      - ai_analysis
    regions:
      hotlist: true
      new_items: true
      rss: false
      standalone: false
      ai_analysis: true
    standalone:
      platforms: []
      rss_feeds: []
      max_items: 20

  # ===============================================================
  # 6. 推送通知
  # ===============================================================
  notification:
    enabled: true
    push_window:
      enabled: false
      start: "20:00"
      end: "22:00"
      once_per_day: true
    channels:
      feishu:
        webhook_url: ""
      dingtalk:
        webhook_url: ""
      telegram:
        bot_token: ""
        chat_id: ""

  # ===============================================================
  # 7. 存储配置
  # ===============================================================
  storage:
    backend: "auto"
    formats:
      sqlite: true
      txt: false
      html: true
    local:
      data_dir: "output"
      retention_days: 0

  # ===============================================================
  # 8. AI 模型配置
  # ===============================================================
  ai:
    model: "deepseek/deepseek-chat"
    api_key: ""
    timeout: 120
    temperature: 1.0
    max_tokens: 5000

  # ===============================================================
  # 9. AI 分析
  # ===============================================================
  ai_analysis:
    enabled: true
    analysis_window:
      enabled: false
    language: "Chinese"
    mode: "follow_report"
    max_news_for_analysis: 60
    include_rss: false
    include_rank_timeline: true

  # ===============================================================
  # 10. 高级设置
  # ===============================================================
  advanced:
    debug: false
    crawler:
      request_interval: 2000
      use_proxy: false
    weight:
      rank: 0.6
      frequency: 0.3
      hotness: 0.1
